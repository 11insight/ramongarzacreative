<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="robots" content="noindex" />
  <title>RGC · Filmcam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Hanken+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000; color: #fff;
      font-family: "Hanken Grotesk", system-ui, sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }
    button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
    a { color: inherit; text-decoration: none; }

    /* ---------- stage ---------- */
    .stage {
      position: fixed; inset: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    /* video + canvas fill the entire middle row */
    .view {
      position: relative;
      overflow: hidden;
      background: #0a0a0c;
    }
    .v-source {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      pointer-events: none;
    }
    .v-source.front { transform: scaleX(-1); }   /* mirror selfie cam */
    .v-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      z-index: 2;
      display: block;
    }

    /* ---------- top bar ---------- */
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding:
        max(env(safe-area-inset-top), 14px)
        16px 12px 16px;
      gap: 12px;
      background: linear-gradient(to bottom, rgba(0,0,0,.6), rgba(0,0,0,0));
      z-index: 4;
    }
    .brand {
      font-family: "Bebas Neue", Impact, sans-serif;
      letter-spacing: .18em; font-size: 22px;
    }
    .brand sup { font-size: .45em; vertical-align: top; opacity: .7; }
    .rec {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: "Space Mono", monospace;
      font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
      color: rgba(255,255,255,.85);
    }
    .rec::before {
      content: ""; width: 8px; height: 8px; border-radius: 50%;
      background: #ff3344; box-shadow: 0 0 8px rgba(255,52,68,.7);
      animation: rec-blink 1.4s steps(2) infinite;
    }
    @keyframes rec-blink { 50% { opacity: .35; } }
    .top-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(20,20,20,.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.14);
      display: grid; place-items: center;
      font-size: 18px;
    }
    .top-btn:active { background: rgba(40,40,40,.8); }

    /* ---------- bottom controls ---------- */
    .bottom {
      display: grid;
      grid-template-rows: auto auto;
      gap: 14px;
      padding:
        14px 16px
        max(env(safe-area-inset-bottom), 14px) 16px;
      background: linear-gradient(to top, rgba(0,0,0,.7), rgba(0,0,0,0));
      z-index: 4;
    }

    /* preset chips */
    .chips {
      display: flex; gap: 6px;
      overflow-x: auto;
      padding: 2px;
      scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      display: grid; gap: 2px;
      padding: 8px 14px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      background: rgba(20,20,20,.55);
      backdrop-filter: blur(6px);
      color: rgba(255,255,255,.7);
      transition: border-color .15s ease, color .15s ease, background .15s ease, box-shadow .15s ease;
    }
    .chip .name {
      font-family: "Hanken Grotesk", system-ui, sans-serif;
      font-weight: 700; font-size: 12px; letter-spacing: .04em;
    }
    .chip .sub {
      font-family: "Space Mono", monospace;
      font-size: 9px; letter-spacing: .14em; text-transform: uppercase;
      color: rgba(255,255,255,.45);
    }
    .chip.on {
      color: #fff;
      border-color: #c8fa3c;
      background: rgba(200,250,60,.14);
      box-shadow: 0 0 14px rgba(200,250,60,.30);
    }
    .chip.on .name { color: #c8fa3c; }

    /* shutter row */
    .shutter-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 14px;
    }
    .side {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: rgba(20,20,20,.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.16);
      display: grid; place-items: center;
      font-size: 20px;
      justify-self: end;
    }
    .side.left { justify-self: start; }
    .side:active { background: rgba(40,40,40,.85); }

    .shutter {
      width: 78px; height: 78px;
      border-radius: 50%;
      background: #c8fa3c;
      border: 0;
      box-shadow: 0 0 30px rgba(200,250,60,.75), 0 0 0 4px rgba(200,250,60,.20);
      transition: transform .08s ease, box-shadow .15s ease;
    }
    .shutter:active {
      transform: scale(.94);
      box-shadow: 0 0 44px rgba(200,250,60,.95), 0 0 0 6px rgba(200,250,60,.28);
    }
    .shutter[disabled] {
      background: rgba(120,120,120,.55);
      box-shadow: none;
    }

    /* flash overlay */
    .flash {
      position: absolute; inset: 0;
      background: #fff; opacity: 0;
      pointer-events: none;
      z-index: 3;
    }
    .flash.on { animation: flash-pop .45s ease-out; }
    @keyframes flash-pop {
      0%   { opacity: 0; }
      8%   { opacity: 1; }
      100% { opacity: 0; }
    }

    /* recent thumb */
    .thumb {
      width: 52px; height: 52px;
      border-radius: 10px;
      background: rgba(20,20,20,.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.16);
      overflow: hidden;
      justify-self: end;
      display: grid; place-items: center;
      color: rgba(255,255,255,.45);
      font-family: "Space Mono", monospace; font-size: 10px;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* permission gate / errors */
    .gate {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      background: #000;
      z-index: 5;
      padding: 30px;
      text-align: center;
    }
    .gate.hidden { display: none; }
    .gate h1 {
      font-family: "Bebas Neue", Impact, sans-serif;
      font-size: clamp(40px, 9vw, 84px);
      letter-spacing: .04em;
      margin-bottom: 12px;
    }
    .gate p {
      font-family: "Space Mono", monospace;
      font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
      color: rgba(255,255,255,.7);
      max-width: 320px;
      margin: 0 auto 24px;
      line-height: 1.6;
    }
    .gate .err {
      color: #ff8a8a;
      margin-bottom: 18px;
    }
    .gate button.primary {
      padding: 14px 28px;
      border-radius: 999px;
      background: #c8fa3c;
      color: #000;
      font-family: "Space Mono", monospace;
      font-weight: 700; font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
      box-shadow: 0 0 28px rgba(200,250,60,.5);
    }
    .gate button.primary:active { transform: scale(.97); }
    .gate .back-link {
      display: block; margin-top: 18px;
      font-family: "Space Mono", monospace;
      font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
      color: rgba(255,255,255,.5);
    }

    /* toast for "shared"/"saved" */
    .toast {
      position: absolute; left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 180px);
      transform: translate(-50%, 12px);
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(10,10,10,.85);
      border: 1px solid rgba(200,250,60,.45);
      color: #c8fa3c;
      font-family: "Space Mono", monospace;
      font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
      opacity: 0;
      transition: opacity .25s ease, transform .25s ease;
      pointer-events: none;
      z-index: 6;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    /* ---------- album modal ---------- */
    .album, .detail {
      position: fixed; inset: 0;
      background: #000;
      z-index: 10;
      display: none;
      flex-direction: column;
    }
    .album.open, .detail.open { display: flex; }
    .album-bar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
      padding:
        max(env(safe-area-inset-top), 14px)
        16px 12px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,.7), rgba(0,0,0,0));
    }
    .album-title {
      font-family: "Bebas Neue", Impact, sans-serif;
      letter-spacing: .14em; font-size: 20px;
    }
    .album-title em {
      font-family: "Space Mono", monospace;
      font-size: 11px; letter-spacing: .14em;
      color: #c8fa3c; font-style: normal;
      margin-left: 6px;
    }
    .album-pad { width: 38px; }
    .album-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 6px 14px max(env(safe-area-inset-bottom), 14px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .album-tile {
      aspect-ratio: 9 / 19.5;
      border-radius: 10px;
      overflow: hidden;
      background: #0a0a0c;
      position: relative;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,.08);
      transition: border-color .15s ease, transform .08s ease;
    }
    .album-tile:active { transform: scale(.98); }
    .album-tile:hover { border-color: rgba(200,250,60,.35); }
    .album-tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .album-tile .tag {
      position: absolute; left: 8px; bottom: 8px;
      font-family: "Space Mono", monospace;
      font-size: 9px; letter-spacing: .14em; text-transform: uppercase;
      background: rgba(0,0,0,.6); padding: 3px 7px; border-radius: 4px;
      color: #c8fa3c;
      backdrop-filter: blur(4px);
    }
    .album-empty {
      margin: auto;
      font-family: "Space Mono", monospace;
      font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
      color: rgba(255,255,255,.45);
      padding: 30px;
      text-align: center;
    }
    .album.has-shots .album-empty { display: none; }
    .album:not(.has-shots) .album-grid { display: none; }

    /* ---------- detail (single-photo view inside album) ---------- */
    .detail { z-index: 11; }
    .detail-top {
      display: flex; justify-content: space-between; align-items: center;
      padding: max(env(safe-area-inset-top), 14px) 16px 8px;
      gap: 12px;
    }
    .detail-meta {
      font-family: "Space Mono", monospace;
      font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
      color: rgba(255,255,255,.7);
    }
    .detail-meta strong { color: #c8fa3c; font-weight: 400; }
    .detail-img-wrap {
      flex: 1;
      display: grid; place-items: center;
      padding: 8px 14px;
      overflow: hidden;
    }
    .detail-img-wrap img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }
    .detail-bar {
      display: flex; justify-content: center; gap: 12px;
      padding: 12px 16px max(env(safe-area-inset-bottom), 18px);
    }
    .detail-btn {
      padding: 14px 28px;
      border-radius: 999px;
      background: #c8fa3c; color: #000;
      font-family: "Space Mono", monospace;
      font-weight: 700; font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
      box-shadow: 0 0 24px rgba(200,250,60,.55);
    }
    .detail-btn:active { transform: scale(.97); }
    .detail-btn.ghost {
      background: rgba(20,20,20,.7);
      color: var(--vy-fg, #fff);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div class="stage">
    <header class="topbar">
      <a href="/" class="top-btn" aria-label="Back to RGC">←</a>
      <span class="brand">RGC<sup>™</sup></span>
      <span class="rec">REC · <span id="tc">00:00:00:00</span></span>
    </header>

    <div class="view" id="view">
      <!-- video shown directly (no downsampling canvas overlay) so the viewfinder
           stays sharp at native resolution. The preset is applied only at snap time. -->
      <video id="video" class="v-source" playsinline muted autoplay></video>
      <div class="flash" id="flash"></div>

      <!-- permission / loading gate, shown until camera streams -->
      <div class="gate" id="gate">
        <h1>Filmcam</h1>
        <p id="gateMsg">5 film presets · WYSIWYG capture.<br/>Tap Start, then allow camera access.</p>
        <p class="err" id="errMsg" style="display:none"></p>
        <button class="primary" id="startBtn">▸ Start Camera</button>
        <a class="back-link" href="/">← back to rgc</a>
      </div>
    </div>

    <footer class="bottom">
      <div class="chips" id="chips" role="radiogroup" aria-label="Film preset"></div>
      <div class="shutter-row">
        <button class="side left" id="flipBtn" aria-label="Flip camera">⇆</button>
        <button class="shutter" id="shutter" aria-label="Capture photo" disabled></button>
        <button class="thumb" id="thumb" aria-label="Last frame">06</button>
      </div>
    </footer>

    <div class="toast" id="toast"></div>
  </div>

  <!-- album of session shots -->
  <div class="album" id="album" aria-hidden="true">
    <header class="album-bar">
      <button class="top-btn" id="albumClose" aria-label="Close album">✕</button>
      <span class="album-title">Album<em><span id="albumCount">0</span> shots</em></span>
      <span class="album-pad"></span>
    </header>
    <div class="album-empty" id="albumEmpty">No shots yet. Tap the shutter to fill the album.</div>
    <div class="album-grid" id="albumGrid"></div>
  </div>

  <!-- single-photo detail view (opens from album) -->
  <div class="detail" id="detail" aria-hidden="true">
    <div class="detail-top">
      <button class="top-btn" id="detailClose" aria-label="Back to album">←</button>
      <span class="detail-meta"><strong id="detailPreset">Super-8</strong> · <span id="detailTime"></span></span>
      <span class="album-pad"></span>
    </div>
    <div class="detail-img-wrap"><img id="detailImg" alt="captured photo" /></div>
    <div class="detail-bar">
      <button class="detail-btn ghost" id="detailDownload">↓ Download</button>
      <button class="detail-btn" id="detailShare">↑ Share / Save</button>
    </div>
  </div>

  <script>
  /* =========================================================
     RGC Filmcam — standalone full-viewport camera.
     5 presets, WYSIWYG canvas, Web Share API capture, back-camera default.
     ========================================================= */
  const CAM_W = 540, CAM_H = 1170;

  const PRESETS = [
    {
      id: "super8", name: "Super-8", sub: "Warm · leaks",
      filter: "saturate(1.10) contrast(1.12) brightness(1.04) sepia(.14)",
      overlay(ctx, W, H, grain) {
        ctx.globalCompositeOperation = "screen";
        const tl = ctx.createRadialGradient(W*.15, H*.08, 0, W*.15, H*.08, W*.85);
        tl.addColorStop(0,"rgba(255,140,60,.42)"); tl.addColorStop(.30,"rgba(255,100,40,.16)"); tl.addColorStop(1,"rgba(0,0,0,0)");
        ctx.fillStyle = tl; ctx.fillRect(0,0,W,H);
        const br = ctx.createRadialGradient(W*.95, H*.95, 0, W*.95, H*.95, W*.9);
        br.addColorStop(0,"rgba(255,180,100,.32)"); br.addColorStop(1,"rgba(0,0,0,0)");
        ctx.fillStyle = br; ctx.fillRect(0,0,W,H);
        const fy = H*.36;
        const fl = ctx.createLinearGradient(0,fy,W,fy);
        fl.addColorStop(0,"rgba(120,200,255,0)");
        fl.addColorStop(.45,"rgba(190,235,255,.55)");
        fl.addColorStop(.62,"rgba(220,245,255,.5)");
        fl.addColorStop(1,"rgba(120,200,255,0)");
        ctx.fillStyle = fl; ctx.fillRect(0, fy-5, W, 10);
        ctx.globalCompositeOperation = "source-over";
        vignette(ctx, W, H, .30, .85);
        drawGrain(ctx, W, H, grain, .20);
      }
    },
    {
      id: "ektachrome", name: "Ektachrome", sub: "Vivid · daylight",
      filter: "saturate(1.45) contrast(1.18) brightness(1.05) hue-rotate(-3deg)",
      overlay(ctx, W, H, grain) {
        ctx.globalCompositeOperation = "soft-light";
        const t = ctx.createLinearGradient(0,0,0,H);
        t.addColorStop(0,"rgba(180,220,255,.10)"); t.addColorStop(1,"rgba(255,180,200,.10)");
        ctx.fillStyle = t; ctx.fillRect(0,0,W,H);
        ctx.globalCompositeOperation = "source-over";
        vignette(ctx, W, H, .55, .42);
        drawGrain(ctx, W, H, grain, .08);
      }
    },
    {
      id: "noir", name: "Noir", sub: "B&W · contrast",
      filter: "grayscale(1) contrast(1.45) brightness(.94)",
      overlay(ctx, W, H, grain) {
        vignette(ctx, W, H, .30, .95);
        drawGrain(ctx, W, H, grain, .16);
      }
    },
    {
      id: "vhs", name: "VHS", sub: "Tape · chroma",
      filter: "saturate(.85) contrast(1.05) brightness(1.04) blur(.3px)",
      overlay(ctx, W, H, grain) {
        ctx.globalCompositeOperation = "screen";
        ctx.fillStyle = "rgba(255,40,60,.10)";  ctx.fillRect(3, 0, W, H);
        ctx.fillStyle = "rgba(60,170,255,.10)"; ctx.fillRect(-3, 0, W, H);
        ctx.globalCompositeOperation = "multiply";
        for (let y = 0; y < H; y += 3) { ctx.fillStyle = "rgba(0,0,0,.16)"; ctx.fillRect(0, y, W, 1); }
        ctx.globalCompositeOperation = "source-over";
        if (((Date.now() / 100) | 0) % 7 === 0) {
          ctx.fillStyle = "rgba(255,255,255,.10)";
          ctx.fillRect(0, Math.random() * H, W, 4);
        }
        drawGrain(ctx, W, H, grain, .13);
      }
    },
    {
      id: "cinestill", name: "CineStill", sub: "Halation · 800T",
      filter: "saturate(1.20) contrast(1.08) brightness(1.02) hue-rotate(-7deg)",
      halate: true,
      overlay(ctx, W, H, grain) {
        ctx.globalCompositeOperation = "soft-light";
        const w = ctx.createLinearGradient(0,0,0,H);
        w.addColorStop(0,"rgba(255,170,110,.12)"); w.addColorStop(1,"rgba(255,140,80,.08)");
        ctx.fillStyle = w; ctx.fillRect(0,0,W,H);
        ctx.globalCompositeOperation = "source-over";
        vignette(ctx, W, H, .55, .42);
        drawGrain(ctx, W, H, grain, .07);
      }
    }
  ];

  function vignette(ctx, W, H, inner, alpha) {
    const vg = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*inner, W/2, H/2, Math.max(W,H)*.85);
    vg.addColorStop(0, "rgba(0,0,0,0)");
    vg.addColorStop(1, "rgba(0,0,0," + alpha + ")");
    ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);
  }

  let grainCanvas = null;
  function buildGrain() {
    const g = document.createElement("canvas");
    g.width = 256; g.height = 256;
    const c = g.getContext("2d");
    const img = c.createImageData(256, 256);
    for (let i = 0; i < img.data.length; i += 4) {
      const n = 128 + ((Math.random() - .5) * 110);
      img.data[i] = img.data[i+1] = img.data[i+2] = n;
      img.data[i+3] = 255;
    }
    c.putImageData(img, 0, 0);
    grainCanvas = g;
  }
  function drawGrain(ctx, W, H, grain, alpha) {
    if (!grain) return;
    ctx.save();
    ctx.globalCompositeOperation = "overlay";
    ctx.globalAlpha = alpha;
    const ox = (Math.random() * 256) | 0;
    const oy = (Math.random() * 256) | 0;
    ctx.translate(-ox, -oy);
    const p = ctx.createPattern(grain, "repeat");
    ctx.fillStyle = p;
    ctx.fillRect(ox, oy, W, H);
    ctx.restore();
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = "source-over";
  }

  // Live preview = raw mirrored/cover-fit video. NO filter, NO overlays.
  // (The selected preset is applied only when you snap, not in the viewfinder,
  // so framing is clean and matches what you see is what you get for COMPOSITION.)
  function drawLive(ctx, video, W, H) {
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) return;
    const scale = Math.max(W / vw, H / vh);
    const dw = vw * scale, dh = vh * scale;
    const dx = (W - dw) / 2, dy = (H - dh) / 2;
    ctx.save();
    ctx.clearRect(0, 0, W, H);
    if (facingMode === "user") { ctx.translate(W, 0); ctx.scale(-1, 1); ctx.drawImage(video, W - dx - dw, dy, dw, dh); }
    else { ctx.drawImage(video, dx, dy, dw, dh); }
    ctx.restore();
  }

  // applyPreset = the full Super-8/Ektachrome/Noir/VHS/CineStill pipeline.
  // Called only when the shutter fires, on a fresh higher-resolution canvas
  // so saved photos look crisp.
  function applyPreset(ctx, tmp, video, preset, W, H) {
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) return;
    const scale = Math.max(W / vw, H / vh);
    const dw = vw * scale, dh = vh * scale;
    const dx = (W - dw) / 2, dy = (H - dh) / 2;
    ctx.save();
    ctx.filter = preset.filter || "none";
    if (facingMode === "user") { ctx.translate(W, 0); ctx.scale(-1, 1); ctx.drawImage(video, W - dx - dw, dy, dw, dh); }
    else { ctx.drawImage(video, dx, dy, dw, dh); }
    ctx.restore();
    ctx.filter = "none";
    if (preset.halate) {
      const t = tmp.getContext("2d");
      t.save();
      t.clearRect(0, 0, W, H);
      t.filter = "blur(10px) brightness(1.55) saturate(2) sepia(.45) hue-rotate(-12deg)";
      if (facingMode === "user") { t.translate(W, 0); t.scale(-1, 1); t.drawImage(video, W - dx - dw, dy, dw, dh); }
      else { t.drawImage(video, dx, dy, dw, dh); }
      t.restore();
      t.filter = "none";
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.globalAlpha = .55;
      ctx.drawImage(tmp, 0, 0);
      ctx.restore();
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = "source-over";
    }
    preset.overlay(ctx, W, H, grainCanvas);
  }

  /* ---------- runtime state ---------- */
  let stream = null;
  let facingMode = "environment";   // default to back camera per user request
  let presetIx = 0;
  let shots = [];
  let rafId = 0, vfcId = 0, active = false;
  let tcStart = 0;

  const video    = document.getElementById("video");
  const gate     = document.getElementById("gate");
  const errMsg   = document.getElementById("errMsg");
  const startBtn = document.getElementById("startBtn");
  const shutter  = document.getElementById("shutter");
  const flipBtn  = document.getElementById("flipBtn");
  const thumbEl  = document.getElementById("thumb");
  const chipsEl  = document.getElementById("chips");
  const flashEl  = document.getElementById("flash");
  const tcEl     = document.getElementById("tc");
  const toastEl  = document.getElementById("toast");

  /* build the preset chips */
  PRESETS.forEach((p, i) => {
    const b = document.createElement("button");
    b.className = "chip" + (i === 0 ? " on" : "");
    b.setAttribute("role", "radio");
    b.setAttribute("aria-checked", String(i === 0));
    b.dataset.ix = String(i);
    b.innerHTML = '<span class="name">' + p.name + '</span><span class="sub">' + p.sub + '</span>';
    b.addEventListener("click", () => setPreset(i));
    chipsEl.appendChild(b);
  });

  function setPreset(i) {
    presetIx = i;
    Array.from(chipsEl.children).forEach((c, j) => {
      c.classList.toggle("on", j === i);
      c.setAttribute("aria-checked", String(j === i));
    });
  }

  function setFacingClass() {
    video.classList.toggle("front", facingMode === "user");
    // we mirror via canvas only on the captured pass, but CSS-mirror the raw video element
    // when it's selfie so the underlying "fallback" preview matches the canvas.
  }

  async function startCamera() {
    errMsg.style.display = "none";
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: facingMode },
          width:  { ideal: 1280 },
          height: { ideal: 1920 }
        },
        audio: false
      });
      setFacingClass();
      video.srcObject = stream;
      await video.play();
      gate.classList.add("hidden");
      shutter.disabled = false;
      tcStart = Date.now();
      startTimecode();
      // no live render loop — the <video> shows directly at native resolution
    } catch (e) {
      errMsg.style.display = "block";
      errMsg.textContent = e && e.name === "NotAllowedError"
        ? "Camera access denied — allow it in browser settings."
        : ("Camera unavailable — " + (e && e.message || e && e.name || "unknown error"));
    }
  }

  function stopCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = null;
  }

  let tcTimer = 0;
  function startTimecode() {
    clearInterval(tcTimer);
    tcTimer = setInterval(() => {
      const e = Date.now() - tcStart;
      const s = (e / 1000) | 0;
      const f = ((e % 1000) / 41.66) | 0;
      const hh = String((s / 3600) | 0).padStart(2, "0");
      const mm = String(((s % 3600) / 60) | 0).padStart(2, "0");
      const ss = String(s % 60).padStart(2, "0");
      const ff = String(f).padStart(2, "0");
      tcEl.textContent = hh + ":" + mm + ":" + ss + ":" + ff;
    }, 100);
  }

  /* ---------- capture ---------- */
  let toastTimer = 0;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1800);
  }
  function flashOn() {
    flashEl.classList.remove("on");
    void flashEl.offsetWidth;
    flashEl.classList.add("on");
  }

  // Capture canvases — built at higher resolution so saved photos look crisp.
  const CAP_W = 1080, CAP_H = 2340;             // ~3x the live preview, 9:19.5 portrait
  const capCanvas = document.createElement("canvas");
  capCanvas.width = CAP_W; capCanvas.height = CAP_H;
  const capTmp = document.createElement("canvas");
  capTmp.width = CAP_W; capTmp.height = CAP_H;

  // Snap = silently add the filtered frame to the in-page album.
  // Sharing / saving to Photos lives in the album detail view, not here,
  // so the camera flow doesn't get interrupted by the iOS share sheet on every shot.
  function capture() {
    if (!stream) return;
    flashOn();
    const capCtx = capCanvas.getContext("2d");
    const preset = PRESETS[presetIx];
    applyPreset(capCtx, capTmp, video, preset, CAP_W, CAP_H);
    const url = capCanvas.toDataURL("image/jpeg", 0.92);
    const id = Date.now();
    shots.unshift({ src: url, id, presetId: preset.id, name: preset.name });
    if (shots.length > 30) shots.length = 30;
    renderThumb();
    if (albumEl && albumEl.classList.contains("open")) renderAlbum();
    toast("Captured ✓ " + preset.name);
  }

  function renderThumb() {
    if (!shots[0]) { thumbEl.textContent = "—"; return; }
    thumbEl.innerHTML = '<img src="' + shots[0].src + '" alt="last frame" />';
  }

  /* ---------- album ---------- */
  const albumEl       = document.getElementById("album");
  const albumGrid     = document.getElementById("albumGrid");
  const albumCount    = document.getElementById("albumCount");
  const albumCloseBtn = document.getElementById("albumClose");
  const detailEl      = document.getElementById("detail");
  const detailImg     = document.getElementById("detailImg");
  const detailPreset  = document.getElementById("detailPreset");
  const detailTime    = document.getElementById("detailTime");
  const detailCloseBtn = document.getElementById("detailClose");
  const detailShare   = document.getElementById("detailShare");
  const detailDownload = document.getElementById("detailDownload");
  let detailShot = null;

  function openAlbum() {
    renderAlbum();
    albumEl.classList.add("open");
    albumEl.setAttribute("aria-hidden", "false");
  }
  function closeAlbum() {
    albumEl.classList.remove("open");
    albumEl.setAttribute("aria-hidden", "true");
  }
  function renderAlbum() {
    albumGrid.innerHTML = "";
    shots.forEach((s) => {
      const tile = document.createElement("div");
      tile.className = "album-tile";
      tile.innerHTML =
        '<img src="' + s.src + '" alt="' + s.name + ' photo" />' +
        '<span class="tag">' + s.name + '</span>';
      tile.addEventListener("click", () => openDetail(s));
      albumGrid.appendChild(tile);
    });
    albumCount.textContent = String(shots.length);
    albumEl.classList.toggle("has-shots", shots.length > 0);
  }
  function openDetail(s) {
    detailShot = s;
    detailImg.src = s.src;
    detailPreset.textContent = s.name;
    const d = new Date(s.id);
    detailTime.textContent = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    detailEl.classList.add("open");
    detailEl.setAttribute("aria-hidden", "false");
  }
  function closeDetail() {
    detailEl.classList.remove("open");
    detailEl.setAttribute("aria-hidden", "true");
    detailShot = null;
  }
  async function shareShot(s) {
    if (!s) return;
    try {
      const blob = await (await fetch(s.src)).blob();
      const file = new File([blob], "RGC-" + s.presetId + "-" + s.id + ".jpg", { type: "image/jpeg" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: "RGC Filmcam" });
      } else {
        const a = document.createElement("a");
        a.href = s.src; a.download = file.name; a.click();
      }
    } catch (e) { /* user cancelled */ }
  }

  /* ---------- events ---------- */
  startBtn.addEventListener("click", startCamera);
  shutter.addEventListener("click", capture);
  flipBtn.addEventListener("click", async () => {
    facingMode = (facingMode === "environment") ? "user" : "environment";
    if (stream) {
      stopCamera();
      await startCamera();
    }
  });
  thumbEl.addEventListener("click", openAlbum);
  albumCloseBtn.addEventListener("click", closeAlbum);
  detailCloseBtn.addEventListener("click", closeDetail);
  detailShare.addEventListener("click", () => shareShot(detailShot));
  detailDownload.addEventListener("click", () => {
    if (!detailShot) return;
    const a = document.createElement("a");
    a.href = detailShot.src;
    a.download = "RGC-" + detailShot.presetId + "-" + detailShot.id + ".jpg";
    a.click();
  });
  // Esc closes whichever modal is on top
  document.addEventListener("keydown", (e) => {
    if (e.key !== "Escape") return;
    if (detailEl.classList.contains("open")) closeDetail();
    else if (albumEl.classList.contains("open")) closeAlbum();
  });
  document.addEventListener("visibilitychange", () => {
    if (document.hidden && stream) stopCamera();
  });
  window.addEventListener("pagehide", stopCamera);

  buildGrain();
  </script>
</body>
</html>
